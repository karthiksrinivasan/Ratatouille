name: ratatouille
description: A live cooking companion app powered by AI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.25.0
  firebase_auth: ^4.17.0

  # Networking
  http: ^1.2.0
  web_socket_channel: ^2.4.0

  # State management
  provider: ^6.1.0

  # Routing
  go_router: ^13.0.0

  # Environment config
  flutter_dotenv: ^5.1.0

  # UI utilities
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
